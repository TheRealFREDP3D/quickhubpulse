version: "3.8"

services:
  github-stats-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: github-stats-dashboard
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    # Uncomment the following lines to mount volumes for development
    # volumes:
    #   - ./client/src:/app/client/src
    #   - ./server:/app/server
    # environment:
    #   - NODE_ENV=development
    # command: pnpm dev

